<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css" />
    <title>Number Guessing Game 2</title>
</head>
<body>
    <h1 id="heading">NUMBER GUESSING GAME</h1>
    <section class="container">
      <p id="instruction"></p>
      <article class="input-container">
        <label for="guess">Enter your guess:</label>
        <input type="text" id="guess" />
      </article>
      <input type="submit" id="btn" />
      <p id="feedback">Enter a number and click submit to continue</p>
    </section>
    <div class="creator"><p>Created by Sudaice</p></div>
    <script src="index.js"></script>
</body>
</html>
